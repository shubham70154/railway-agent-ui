<div class="chat-container">
  <div class="chat-box">
    <div class="messages-container">
      <div *ngFor="let msg of messages" class="message" [ngClass]="msg.sender.toLowerCase()">
        <div class="message-sender">{{ msg.sender }}</div>
        <div class="message-text">{{ msg.text }}</div>
      </div>
    </div>
  </div>

  <div class="input-container">
    <textarea
      [(ngModel)]="message"
      (keyup.enter)="sendMessage()"
      placeholder="Type your railway query... e.g., 'Check PNR status' or 'Where is train 12427?'"
      class="message-input"
      rows="2"
      id="messageInput"
    ></textarea>

    <select [(ngModel)]="selectedModel" class="model-select">
      <option *ngFor="let m of models" [value]="m">{{ m }}</option>
    </select>

    <div class="button-group">
      <button (click)="sendMessage()" class="send-button">Send</button>
      <button (click)="clearChat()" class="send-button secondary">Clear Chat</button>
    </div>
  </div>
</div>
